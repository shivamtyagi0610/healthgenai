name: healthgenai
description: "HealthGenAI - AI-powered health & medicine app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # AI / ML
  google_generative_ai: ^0.4.6

  # Storage & Config
  shared_preferences: ^2.3.4
  flutter_dotenv: ^5.2.1

  # Firebase Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0

  # Utilities
  equatable: ^2.0.7
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  flutter_markdown: ^0.7.7+1
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "android/assets/appicon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
